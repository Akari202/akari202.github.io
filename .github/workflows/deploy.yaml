name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install LLD
        run: sudo apt-get install lld

      - name: Cache Didactic Binary
        id: cache-didactic
        uses: actions/cache@v4
        with:
          path: didactic/target/release/didactic
          key: ${{ runner.os }}-didactic-${{ hashFiles('didactic/**/*.rs', 'didactic/Cargo.lock') }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: didactic -> didactic/Cargo.lock

      - name: Build didactic
        if: steps.cache-didactic.outputs.cache-hit != "true"
        working-directory: didactic
        run: cargo build --release

      - name: Build site
        working-directory: didactic
        run: ./target/release/didactic build -d ../ -m

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
